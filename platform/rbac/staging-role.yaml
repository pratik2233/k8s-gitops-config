apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: staging
  name: staging-developer-role
rules:
  - apiGroups: ["", "apps", "autoscaling", "networking.k8s.io"]
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - deployments
      - replicasets
      - horizontalpodautoscalers
      - ingresses
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
